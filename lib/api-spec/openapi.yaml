        totalCredit:
          type: number
        totalDebit:
          type: number
        totalVoucher:
          type: number
        totalSales:
          type: number
        totalWithdrawals:
          type: number
        totalSupplies:
          type: number
        totalManualIn:
          type: number
        expectedCash:
          type: number

