      properties:
        id:
          type: integer
        name:
          type: string
        mainNeighborhood:
          type: string
        includedNeighborhoods:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [available, in_progress, completed]
        color:
          type: string
        courierName:
          type: ["string", "null"]
        storeOrigin:
          type: string
        mapsUrl:
          type: ["string", "null"]
        totalDeliveryFee:
          type: number
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
