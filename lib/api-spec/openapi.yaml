openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Restaurant POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and current actor operations
  - name: tables
    description: Table management
  - name: customers
    description: Customer management
  - name: menu
    description: Menu and product management
  - name: orders
    description: Order management
  - name: payments
    description: Payment processing
  - name: kitchen
    description: Kitchen queue
  - name: dashboard
    description: Dashboard and analytics
  - name: cash
    description: Cash register management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"


  /auth/me:
    get:
      operationId: getCurrentActor
      tags: [auth]
      summary: Get current RBAC actor
      description: Returns the current actor resolved by the backend auth/RBAC context.
      responses:
        "200":
          description: Current actor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentActor"
        "401":
          description: Authentication required
        "403":
          description: Forbidden

  # Tables
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List all tables
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{id}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get a table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
        "404":
          description: Not found
    patch:
      operationId: updateTable
      tags: [tables]
      summary: Update a table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete a table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Menu Categories
  /menu/categories:
    get:
      operationId: listCategories
      tags: [menu]
      summary: List menu categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [menu]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /menu/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [menu]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [menu]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Menu Products
  /menu/products:
    get:
      operationId: listProducts
      tags: [menu]
      summary: List menu products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: availableOnly
          in: query
          description: If true, return only available and active products
          schema:
            type: boolean
        - name: includeInactive
          in: query
          description: If true, include inactive (soft-deleted) products
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [menu]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /menu/products/{id}:
    get:
      operationId: getProduct
      tags: [menu]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [menu]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [menu]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /menu/products/{id}/variants:
    get:
      operationId: listProductVariants
      tags: [menu]
      summary: List product variants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of product variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductVariant"
    post:
      operationId: createProductVariant
      tags: [menu]
      summary: Create a product variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"



  /menu/addon-groups:
    get:
      operationId: listAddonGroups
      tags: [menu]
      summary: List addon groups
      responses:
        "200":
          description: List of addon groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddonGroup"
    post:
      operationId: createAddonGroup
      tags: [menu]
      summary: Create addon group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonGroup"

  /menu/addon-groups/{id}:
    patch:
      operationId: updateAddonGroup
      tags: [menu]
      summary: Update addon group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonGroup"

  /menu/addon-groups/{id}/options:
    get:
      operationId: listAddonOptions
      tags: [menu]
      summary: List addon options
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of addon options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddonOption"
    post:
      operationId: createAddonOption
      tags: [menu]
      summary: Create addon option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonOptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonOption"

  /menu/addon-options/{id}:
    patch:
      operationId: updateAddonOption
      tags: [menu]
      summary: Update addon option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonOptionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonOption"

  /menu/products/{id}/addon-groups:
    get:
      operationId: listProductAddonGroups
      tags: [menu]
      summary: List addon groups linked to product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product addon groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddonGroup"
    put:
      operationId: updateProductAddonGroups
      tags: [menu]
      summary: Replace product addon group links
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductAddonGroupsInput"
      responses:
        "200":
          description: Updated product addon groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddonGroup"

  /menu/variant-templates:
    get:
      operationId: listVariantTemplates
      tags: [menu]
      summary: List variant templates
      responses:
        "200":
          description: List of variant templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createVariantTemplate
      tags: [menu]
      summary: Create variant template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                active:
                  type: boolean
      responses:
        "201":
          description: Created
  /menu/variant-templates/{id}:
    patch:
      operationId: updateVariantTemplate
      tags: [menu]
      summary: Update variant template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteVariantTemplate
      tags: [menu]
      summary: Delete variant template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /menu/variant-templates/{id}/options:
    get:
      operationId: listVariantTemplateOptions
      tags: [menu]
      summary: List variant template options
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of options
    post:
      operationId: createVariantTemplateOption
      tags: [menu]
      summary: Create variant template option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price]
              properties:
                name:
                  type: string
                price:
                  type: number
                available:
                  type: boolean
      responses:
        "201":
          description: Created
  /menu/variant-template-options/{id}:
    patch:
      operationId: updateVariantTemplateOption
      tags: [menu]
      summary: Update variant template option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteVariantTemplateOption
      tags: [menu]
      summary: Delete variant template option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /menu/products/{id}/apply-variant-template:
    post:
      operationId: applyVariantTemplateToProduct
      tags: [menu]
      summary: Apply variant template to product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId]
              properties:
                templateId:
                  type: integer
      responses:
        "201":
          description: Created product variants

  /menu/product-variants/{id}:
    patch:
      operationId: updateProductVariant
      tags: [menu]
      summary: Update a product variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
    delete:
      operationId: deleteProductVariant
      tags: [menu]
      summary: Delete a product variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, preparing, ready, closed, cancelled]
        - name: tableId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/items:
    post:
      operationId: addOrderItem
      tags: [orders]
      summary: Add item to an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"

  /orders/{id}/items/{itemId}:
    delete:
      operationId: removeOrderItem
      tags: [orders]
      summary: Remove an item from an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /orders/{id}/send-to-kitchen:
    post:
      operationId: sendOrderToKitchen
      tags: [orders, kitchen]
      summary: Send order to kitchen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sent to kitchen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/delivery-status:
    patch:
      operationId: updateDeliveryStatus
      tags: [orders]
      summary: Update delivery status of an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryStatusUpdate"
      responses:
        "200":
          description: Delivery status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  # Payments
  /payments:
    post:
      operationId: createPayment
      tags: [payments]
      summary: Process payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{orderId}/receipt:
    get:
      operationId: getReceipt
      tags: [payments]
      summary: Get receipt for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  # Kitchen queue
  /kitchen/queue:
    get:
      operationId: getKitchenQueue
      tags: [kitchen]
      summary: Get current kitchen queue
      responses:
        "200":
          description: Kitchen queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitchenTicket"

  /kitchen/tickets/{id}/ready:
    post:
      operationId: markTicketReady
      tags: [kitchen]
      summary: Mark a kitchen ticket as ready
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket marked ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitchenTicket"

  # Dashboard
  /alerts:
    get:
      operationId: getAlerts
      tags: [dashboard]
      summary: Get operational alert counts for badges and dashboard
      responses:
        "200":
          description: Alert counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders feed
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales breakdown by category
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  # Cash Register
  /cash/current:
    get:
      operationId: getCurrentCashRegister
      tags: [cash]
      summary: Get currently open cash register
      responses:
        "200":
          description: Open cash register
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegisterDetail"
        "404":
          description: No open cash register

  /cash/open:
    post:
      operationId: openCashRegister
      tags: [cash]
      summary: Open a cash register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashRegisterInput"
      responses:
        "201":
          description: Cash register opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegisterDetail"

  /cash/history:
    get:
      operationId: listCashRegisters
      tags: [cash]
      summary: List all cash registers
      responses:
        "200":
          description: List of cash registers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashRegisterDetail"

  /cash/{id}:
    get:
      operationId: getCashRegister
      tags: [cash]
      summary: Get a cash register with movements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cash register found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegisterDetail"
        "404":
          description: Not found

  /cash/{id}/close:
    post:
      operationId: closeCashRegister
      tags: [cash]
      summary: Close a cash register
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashRegisterClose"
      responses:
        "200":
          description: Cash register closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegisterDetail"

  /cash/movements:
    post:
      operationId: addCashMovement
      tags: [cash]
      summary: Add a cash movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashMovementInput"
      responses:
        "201":
          description: Movement added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashMovement"

  /settings:
    get:
      operationId: getStoreSettings
      tags: [settings]
      summary: Get store settings
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
    put:
      operationId: updateStoreSettings
      tags: [settings]
      summary: Update store settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"

  /integrations/orders/inbound:
    post:
      operationId: createInboundOrder
      tags: [integrations]
      summary: Receive external order (iFood, WhatsApp, site, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboundOrderInput"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundOrderResponse"
        "400":
          description: Invalid input
        "401":
          description: Invalid or missing x-integration-key header
        "409":
          description: Duplicate order (same source + externalOrderId)

  /delivery/orders/awaiting-settlement:
    get:
      operationId: listAwaitingSettlement
      tags: [delivery]
      summary: List delivery orders awaiting payment settlement
      responses:
        "200":
          description: List of orders awaiting financial settlement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AwaitingSettlementOrder"

  /delivery/orders/{id}/settle:
    post:
      operationId: settleDeliveryOrder
      tags: [delivery]
      summary: Register payment receipt for a delivery order paid on delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleDeliveryBody"
      responses:
        "201":
          description: Payment registered and order closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "409":
          description: Duplicate payment or no open cash register

  /delivery/routes/{id}/adjust-time:
    post:
      operationId: adjustRouteTime
      tags: [delivery]
      summary: Adjust route dispatch deadline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustRouteTimeInput"
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRoute"

