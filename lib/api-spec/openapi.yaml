            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
            reference:
              type: string
            fee:
              type: number
            distanceKm:
              type: number
        payment:
          type: object
          properties:
            timing:
              type: string
              enum: [now, on_delivery]
            method:
              type: string
            changeFor:
              type: number
            notes:
              type: string
        items:
          type: array
