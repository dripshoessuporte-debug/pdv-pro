kind = "web"
previewPath = "/"
title = "Restaurant PDV"
version = "1.0.0"
id = "artifacts/restaurant-pdv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20227

[services.development]
run = "pnpm --filter @workspace/restaurant-pdv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/restaurant-pdv", "run", "build" ]
publicDir = "artifacts/restaurant-pdv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20227"
BASE_PATH = "/"
